resume_header_intro: "<p>Hands-on technology and eCommerce leader with deep experience building and scaling digital commerce platforms, cloud infrastructure, AI-driven automation, and operational systems across startups and growth-stage businesses. My background spans eCommerce, cloud architecture, DevOps, marketplaces, growth systems, and venture-backed technology environments.</p>
<p>I&rsquo;ve led and architected headless commerce platforms, cloud-native infrastructure, affiliate commerce ecosystems, monetization systems, and large-scale eCommerce operations across Shopify, Magento, AWS, GCP, React, Next.js, Node.js, Kubernetes, and modern AI-assisted development workflows. My experience spans both hands-on engineering execution and broader product, operational, and growth leadership.</p>
<p>Over the course of my career, I&rsquo;ve scaled eCommerce businesses through SEO, CRO, marketplace distribution, infrastructure modernization, and operational automation. I&rsquo;ve designed APIs and middleware integrating ERPs, 3PLs, CRMs, payment providers, and fulfillment systems, while leading infrastructure initiatives focused on scalability, reliability, observability, and performance optimization.</p>
<p>I&rsquo;ve also invested in and advised early-stage commerce and technology companies, supporting founders across eCommerce strategy, operational scaling, infrastructure, monetization, and technical execution across eCommerce, SaaS, marketplaces, creator monetization, and social commerce platforms.</p>
<p>More recently, my focus has expanded into AI-driven development and workflow automation using ChatGPT, Claude, Gemini, GitHub Copilot, vector databases, RAG architectures, semantic retrieval pipelines, and agent-based automation systems for prototyping, operational tooling, eCommerce optimization, and workflow acceleration.</p>
<p><b>Specialties include:</b> eCommerce and marketplace platforms; cloud infrastructure and DevOps; AI automation and workflow systems; headless commerce and scalable architectures; startup and high-growth technology environments.</p>"

