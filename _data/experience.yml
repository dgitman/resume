    management.</li> <li>  Built a dedicated Help Desk Organization and
    established Service Management procedures based on ITIL standards,
    improving quality of services to users and clients by 620%.</li> <li>
    Instituted procedures for physical and network security, user access and
    password controls, anti-virus / malware, patch management, data
    backup/recovery, change control, problem management, and end-user
    computing.</li> <li>  Created and implemented product development, release
    management, change management, and configuration management lifecycles
    across development, quality assurance and staging environments for over 150
