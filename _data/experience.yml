    <p>Led distributed cross-functional teams across engineering, product,
    operations, marketing, finance, and fulfillment spanning the United States,
    Ukraine, Israel, Armenia, India, and the Philippines, supporting software
    delivery, ecommerce operations, production support, and growth optimization
    initiatives.</p>
    <p>Designed and scaled headless ecommerce platforms across Shopify Plus,
    Magento, React, Next.js, Node.js, and cloud-native architectures, building
    APIs, integrations, middleware, and automation workflows connecting ERPs,
    3PLs, CRMs, payment providers, and fulfillment systems.</p>
    <p>Architected and operated scalable AWS and GCP infrastructure utilizing
    EC2, S3, CloudFront, EKS, RDS, ElastiCache, Terraform, Docker, Kubernetes,
    GitHub Actions, and Infrastructure-as-Code workflows supporting
    high-availability ecommerce environments and large-scale traffic spikes.</p>
    <p>Conducted hands-on AI R&amp;D and workflow automation using ChatGPT,
    Claude, Gemini, GitHub Copilot, vector databases, RAG architectures,
    semantic retrieval pipelines, and agent-driven workflows supporting
    ecommerce optimization, operational tooling, and accelerated development
    workflows.</p>
    <p>Built ecommerce growth, SEO, CRO, and lifecycle marketing systems across
    paid search, paid social, affiliate ecosystems, and retention campaigns,
    increasing ecommerce conversion rates by 165% and driving 130K+ monthly
    organic visitors across portfolio brands.</p>

# Head Of eCommerce
- company: Infinite Reality
  sort_start: 202009
  sort_end: 202206
  position: Head Of eCommerce
  duration: Sep, 2020 &mdash; Jun, 2022
  location: Norwalk, Connecticut (Remote)
  summary: >-
    <p>Led architecture, product strategy, and scaling for Infinite Reality&rsquo;s
    metaverse commerce ecosystem, enabling brands to sell physical and digital
    goods across Shopify, Magento, and BigCommerce-integrated environments;
    launched affiliate/referral commerce programs for brands including Fanatics,
    supported Sony Music Entertainment artist migrations to Shopify, and
    architected AWS Glue ETL pipelines for commerce catalog normalization and
    distribution.</p>
    <p>Architected headless commerce infrastructure and metaverse commerce
    products enabling creators and brands to sell physical and digital goods
    without relying on traditional ecommerce platforms, developing custom catalog
    services, cart/checkout APIs, payment and fulfillment integrations, affiliate
    attribution systems, ETL workflows, and identity/account management across
    ERP, PIM, 3PL, and digital fulfillment ecosystems.</p>
    <p>Built and managed a scalable affiliate commerce catalog spanning 250+
    partner networks, architecting ETL pipelines ingesting APIs, affiliate feeds,
    and flat files to normalize, validate, and standardize product, pricing,
    commission, and catalog data across disparate commerce ecosystems.</p>
    <p>Architected creator monetization, wallet, and redemption systems supporting
    mass payouts, digital gift cards, debit card/wallet products, and affiliate
    rewards, designing ledger-based balance management, payout orchestration,
    redemption workflows, KYC/identity verification, fraud/compliance controls,
    reconciliation systems, and settlement operations.</p>
    <p>Supported creator monetization and commerce infrastructure serving 6M+
    registered users and 1M+ monthly active users with high-volume engagement,
    affiliate commerce, micro-payment ledger tracking, and revenue-sharing models
    across large-scale social and immersive commerce ecosystems.</p>

