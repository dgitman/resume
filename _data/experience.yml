# CTO / Technology Advisor
- company: Because Ventures (Igniterate Fund)
  url: https://because.ventures/
  sort_start: 201701
  sort_end: 999912
  position: CTO / Technology Advisor
  duration: Jan, 2017 &mdash; Present
  location: New York, New York
  summary: >-
    <p>Invested in and advised 24 early-stage commerce and technology companies
    including Cadence, Manifest Commerce, Composer, and Lola Olivia,
    supporting eCommerce strategy, operational scaling, platform architecture,
    and growth initiatives for businesses reaching $90M+ revenue, $28B+ trading
    volume, 15M+ executed orders, and 97%+ merchant retention.</p>
    <p>Led distributed cross-functional teams across engineering, product,
    operations, marketing, finance, and fulfillment spanning the United States,
    Ukraine, Israel, Armenia, India, and the Philippines, supporting software
    delivery, eCommerce operations, production support, and growth optimization
    initiatives.</p>
    <p>Designed and scaled headless eCommerce platforms across Shopify Plus,
    Magento, React, Next.js, Node.js, and cloud-native architectures, building
    APIs, integrations, middleware, and automation workflows connecting ERPs,
    3PLs, CRMs, payment providers, and fulfillment systems.</p>
    <p>Architected and operated scalable AWS and GCP infrastructure utilizing
    EC2, S3, CloudFront, EKS, RDS, ElastiCache, Terraform, Docker, Kubernetes,
    GitHub Actions, and Infrastructure-as-Code workflows supporting
    high-availability eCommerce environments and large-scale traffic spikes.</p>
    <p>Conducted hands-on AI R&amp;D and workflow automation using ChatGPT,
    Claude, Gemini, GitHub Copilot, vector databases, RAG architectures,
    semantic retrieval pipelines, and agent-driven workflows supporting
    eCommerce optimization, operational tooling, and accelerated development
    workflows.</p>
    <p>Built eCommerce growth, SEO, CRO, and lifecycle marketing systems across
    paid search, paid social, affiliate ecosystems, and retention campaigns,
    increasing eCommerce conversion rates by 165% and driving 130K+ monthly
    organic visitors across portfolio brands.</p>

