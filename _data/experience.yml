  summary: >-
    <p>Invested in and advised 24 early-stage commerce and technology companies
    including Cadence, Manifest Commerce, Composer, and Lola Olivia,
    supporting ecommerce strategy, operational scaling, platform architecture,
    and growth initiatives for businesses reaching $90M+ revenue, $28B+ trading
